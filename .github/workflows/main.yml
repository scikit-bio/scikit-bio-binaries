name: skbb CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]



# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  build-and-test:
    strategy:
      matrix:
        # macos-13 dropped: GitHub-hosted macos-13 runners were retired
        # in early 2026; jobs queue for 24h and then time out. macos-latest
        # is the current supported macOS runner and stays in the matrix.
        os: [ubuntu-latest, macos-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v3
    - uses: conda-incubator/setup-miniconda@v3
      with:
        miniconda-version: "latest"
        auto-update-conda: true
    - name: Build
      shell: bash -l {0}
      run: |
        df -h .
        cplatform=`conda info |awk '/platform/{print $3}'`
        echo "Conda platform: ${cplatform}"
        if [[ "$(uname -s)" == "Linux" ]];
        then
          if [[ "${cplatform}" == "linux-64" ]];
          then
            # only do GPU compute on x86 platforms for now
            echo "Enabling GPU build"
            # cuda-compiler and gxx must match
            conda create -q --yes --strict-channel-priority -n skbb-build -c conda-forge -c bioconda gxx_${cplatform} cuda-compiler
            export NV_CUDA=Y
          else
            conda create -q --yes --strict-channel-priority -n skbb-build -c conda-forge -c bioconda gxx_${cplatform}
          fi
        else
          conda create -q --yes --strict-channel-priority -n skbb-build -c conda-forge -c bioconda clangxx_${cplatform}
        fi 
        conda activate skbb-build
        conda install --yes --strict-channel-priority -c conda-forge libcblas liblapacke blas-devel make
        conda clean --yes -t
        df -h .
        echo "$(uname -s)"
        $CXX --version
        $CC --version
        export PERFORMING_CONDA_BUILD=True
        echo "======= begin env ====="
        env
        echo "=======  end env  ====="
        # all == build (shlib,bins,tests) and install
        make clean && make clean_install && make all
        df -h .
    - name: Test
      shell: bash -l {0}
      run: |
        conda activate skbb-build
        if [[ "$(uname -s)" == "Linux" ]];
        then
           lscpu
        fi
        # keep it low for runs in containers
        # and a weird number to potentially catch potential bugs
        export OMP_NUM_THREADS=3
        make test

  build-and-test-wasm:
    # Emscripten WASM build: produces libskbb_wasm.a (single-threaded,
    # CPU-only, Eigen-backed) and runs all WASM tests under node. Runs
    # in parallel with the native matrix above.
    #
    # The WASM tests compare against expected values produced by the
    # NATIVE build (see src/tests/wasm/generate_*_expected.cpp). The
    # generated headers are not committed, so this job needs both the
    # emsdk toolchain and a native gcc + cblas + lapacke to build the
    # generators.
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    # Canonical setup-emsdk action (moved from mymindstorm/ to
    # emscripten-core/ in v16). Pin major for reproducibility.
    - uses: emscripten-core/setup-emsdk@v16
      with:
        version: 5.0.3
        actions-cache-folder: emsdk-cache
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install native build deps for expected-value generators
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends \
          g++ make libopenblas-dev liblapacke-dev
    - name: Cache Eigen headers
      uses: actions/cache@v4
      with:
        path: .wasm-cache/eigen
        key: eigen-3.4.0
    - name: Fetch Eigen (cached)
      run: scripts/fetch_eigen.sh
    - name: Verify Eigen cache
      run: scripts/test_eigen_wasm.sh
    - name: Build libskbb_wasm.a
      run: make wasm
    - name: Build native libskbb_cpu.a (for expected-value generators)
      run: |
        # The generators link libskbb_cpu.a + cblas + lapacke. Build only
        # what they need — no install, no GPU, no shared libs.
        env NOGPU=1 PREFIX=/tmp/skbb_unused make -C src libskbb_cpu.a
    - name: Run WASM unit tests
      # Make targets `tests/wasm/expected/*.h` will fire the generators
      # under OMP_NUM_THREADS=1, then build and run the WASM tests.
      run: make wasm_test
    - name: Run WASM public-API tests
      run: make wasm_api_test
